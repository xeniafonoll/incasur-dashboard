<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Incidencias INCASUR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-slate-900 text-white shadow-md px-6 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white">
                <i class="fa-solid fa-chart-bar text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight">Dashboard - Control INCASUR</h1>
                <p class="text-slate-400 text-xs">Visor web en tiempo real</p>
            </div>
        </div>
        <div id="update-timestamp" class="text-xs text-slate-400 bg-slate-800 px-3 py-1 rounded-full border border-slate-700">
            Cargando última actualización...
        </div>
    </header>

    <div class="flex-1 max-w-[1600px] w-full mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <aside class="lg:col-span-1 bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex flex-col gap-5 h-fit lg:sticky lg:top-6">
            <div class="flex items-center justify-between border-b border-slate-100 pb-3">
                <h2 class="font-bold text-slate-900 flex items-center gap-2 text-sm uppercase tracking-wider">
                    <i class="fa-solid fa-sliders text-blue-600"></i> Filtros
                </h2>
                <button id="btn-reset-filters" class="text-xs text-blue-600 hover:text-blue-800 font-medium transition">Limpiar</button>
            </div>

            <input type="text" id="search-input" placeholder="Buscar incidencia..." class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500/20 outline-none">

            <div class="flex flex-col gap-2">
                <label class="text-xs font-semibold text-slate-600">Estado:</label>
                <div id="status-container" class="max-h-36 overflow-y-auto custom-scrollbar flex flex-col gap-1 pr-1"></div>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-xs font-semibold text-slate-600">Departamento:</label>
                <div id="depto-container" class="max-h-44 overflow-y-auto custom-scrollbar flex flex-col gap-1 pr-1"></div>
            </div>
            
            <input type="range" id="days-slider" min="0" max="100" value="0" class="w-full accent-blue-600">
            <span id="slider-value" class="text-xs text-slate-600">Mínimo 0 días</span>
        </aside>

        <main class="lg:col-span-3 flex flex-col gap-6">
            <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-xl border border-slate-200"><div class="text-xs text-slate-500">Tickets</div><div id="kpi-open-tickets" class="text-2xl font-black">0</div></div>
                <div class="bg-white p-4 rounded-xl border border-slate-200"><div class="text-xs text-slate-500">Máx Días</div><div id="kpi-max-days" class="text-2xl font-black">0</div></div>
                <div class="bg-white p-4 rounded-xl border border-slate-200"><div class="text-xs text-slate-500">Avg Atascada</div><div id="kpi-avg-stuck" class="text-2xl font-black">0</div></div>
                <div class="bg-white p-4 rounded-xl border border-slate-200"><div class="text-xs text-slate-500">Reclamaciones</div><div id="kpi-total-reclam" class="text-2xl font-black">0</div></div>
            </section>

            <section class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="py-3 px-4">Incidencia</th>
                                <th class="py-3 px-4">Estado</th>
                                <th class="py-3 px-4">Departamento Responsable</th>
                                <th class="py-3 px-4">Asignee</th>
                                <th class="py-3 px-4 text-center">Días Abierta</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        let originalData = [];
        
        async function fetchData() {
            try {
                const response = await fetch('data.json');
                const json = await response.json();
                
                // Actualizar la fecha arriba a la derecha
                if (json.updated_at) {
                    const date = new Date(json.updated_at);
                    document.getElementById('update-timestamp').textContent = `Actualizado: ${date.toLocaleString()}`;
                }

                originalData = json.issues || [];
                extractUniqueFilters();
                renderFilterCheckboxes();
                applyFilters();
            } catch (err) { console.error(err); }
        }

        function extractUniqueFilters() {
            const statusesSet = new Set(originalData.map(i => i["Estado"]));
            const deptosSet = new Set(originalData.map(i => i["Departamento Responsable"]));
            
            window.availableStatuses = Array.from(statusesSet).sort();
            window.availableDeptos = Array.from(deptosSet).sort();
        }

        function renderFilterCheckboxes() {
            document.getElementById('status-container').innerHTML = window.availableStatuses.map(s => 
                `<label class="flex items-center gap-2"><input type="checkbox" value="${s}" checked class="status-checkbox"> ${s}</label>`).join('');
            document.getElementById('depto-container').innerHTML = window.availableDeptos.map(d => 
                `<label class="flex items-center gap-2"><input type="checkbox" value="${d}" checked class="depto-checkbox"> ${d}</label>`).join('');
            
            document.querySelectorAll('input').forEach(i => i.addEventListener('change', applyFilters));
        }

        function applyFilters() {
            const checkedStatuses = Array.from(document.querySelectorAll('.status-checkbox:checked')).map(cb => cb.value);
            const checkedDeptos = Array.from(document.querySelectorAll('.depto-checkbox:checked')).map(cb => cb.value);
            
            const filtered = originalData.filter(item => 
                checkedStatuses.includes(item["Estado"]) && 
                checkedDeptos.includes(item["Departamento Responsable"])
            );

            renderTable(filtered);
        }

        function renderTable(data) {
            document.getElementById('table-body').innerHTML = data.map(item => `
                <tr class="hover:bg-slate-50">
                    <td class="py-3 px-4 font-bold text-blue-600">${item["Incidencia"]}</td>
                    <td class="py-3 px-4">${item["Estado"]}</td>
                    <td class="py-3 px-4">${item["Departamento Responsable"]}</td>
                    <td class="py-3 px-4">${item["Asignee"]}</td>
                    <td class="py-3 px-4 text-center">${item["Días Abierta Totales"]}</td>
                </tr>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', fetchData);
    </script>
</body>
</html>
