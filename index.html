<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Incidencias INCASUR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-slate-900 text-white shadow-md px-6 py-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold">Cuadro de Mando - Control INCASUR</h1>
            <p class="text-slate-400 text-xs">Visor web en tiempo real de incidencias</p>
        </div>
        <div class="bg-slate-800 px-4 py-2 rounded-lg border border-slate-700 text-xs text-slate-300">
            <i class="fa-solid fa-clock text-blue-400"></i> Datos: <span id="last-update">data.json</span>
        </div>
    </header>

    <div class="flex-1 max-w-[1600px] w-full mx-auto p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <aside class="lg:col-span-1 bg-white p-5 rounded-xl shadow-xs border border-slate-200 h-fit lg:sticky lg:top-6">
            <h2 class="font-bold text-slate-900 mb-4 uppercase text-sm">Filtros</h2>
            <input type="text" id="search-input" placeholder="Buscar..." class="w-full px-3 py-2 bg-slate-50 border rounded-lg text-sm mb-4">
            <div id="status-container" class="mb-4"></div>
            <div id="dept-container" class="mb-4"></div>
            <button id="btn-reset-filters" class="text-xs text-blue-600 font-bold hover:underline">Limpiar Filtros</button>
        </aside>

        <main class="lg:col-span-3 flex flex-col gap-6">
            <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-xl border border-slate-200"><div class="text-xs text-slate-500">Tickets Abiertos</div><div id="kpi-open-tickets" class="text-2xl font-black">0</div></div>
                <div class="bg-white p-4 rounded-xl border border-slate-200"><div class="text-xs text-slate-500">Máx Días</div><div id="kpi-max-days" class="text-2xl font-black">0</div></div>
                <div class="bg-white p-4 rounded-xl border border-slate-200"><div class="text-xs text-slate-500">Avg Atascado</div><div id="kpi-avg-stuck" class="text-2xl font-black">0</div></div>
                <div class="bg-white p-4 rounded-xl border border-slate-200"><div class="text-xs text-slate-500">Reclamaciones</div><div id="kpi-total-reclam" class="text-2xl font-black">0</div></div>
            </section>

            <section class="bg-white rounded-xl shadow-xs border border-slate-200 overflow-hidden">
                <div class="px-5 py-4 border-b flex justify-between items-center">
                    <h3 class="font-bold text-sm">Control de Operaciones</h3>
                    <button id="btn-export-csv" class="bg-emerald-600 text-white px-3 py-1 rounded text-xs font-bold">Exportar CSV</button>
                </div>
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-left text-xs">
                        <thead>
                            <tr class="bg-slate-100 uppercase text-slate-500">
                                <th class="py-3 px-4">Incidencia</th>
                                <th class="py-3 px-4">Asignee</th>
                                <th class="py-3 px-4">Reporter</th>
                                <th class="py-3 px-4">Estado</th>
                                <th class="py-3 px-4">Dpto</th>
                                <th class="py-3 px-4 text-center">Días</th>
                                <th class="py-3 px-4">Resumen</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        let originalData = [], filteredData = [];
        const tableBody = document.getElementById('table-body');

        document.addEventListener('DOMContentLoaded', fetchData);

        async function fetchData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                originalData = data.issues || [];
                applyFilters();
            } catch(e) { console.error("Error cargando JSON", e); }
        }

        function applyFilters() {
            filteredData = originalData; // Aquí aplicarías tus filtros lógicos
            renderTable();
        }

        function renderTable() {
            tableBody.innerHTML = filteredData.map(item => `
                <tr class="hover:bg-slate-50">
                    <td class="py-3 px-4 font-bold">${item["Incidencia"] || ""}</td>
                    <td class="py-3 px-4">${item["Asignee"] || "-"}</td>
                    <td class="py-3 px-4">${item["Reporter"] || "-"}</td>
                    <td class="py-3 px-4"><span class="px-2 py-1 bg-blue-100 rounded-full text-[10px]">${item["Estado"] || ""}</span></td>
                    <td class="py-3 px-4">${item["Departamento Responsable"] || ""}</td>
                    <td class="py-3 px-4 text-center">${item["Días Abierta Totales"] || 0}</td>
                    <td class="py-3 px-4 text-slate-500 max-w-xs truncate">${item["Resumen"] || ""}</td>
                </tr>
            `).join('');
        }

        document.getElementById('btn-export-csv').addEventListener('click', () => {
            const headers = ["Incidencia", "Fecha de Creación", "Estado", "Departamento Responsable", "Asignee", "Reporter", "Días Abierta Totales", "Días atascada en Dpto Actual", "Rebotes a Front-Office", "Nº Reclamaciones", "Resumen", "URL"];
            const csvRows = [headers.join(',')];
            filteredData.forEach(item => {
                csvRows.push(headers.map(h => `"${String(item[h] || "").replace(/"/g, '""')}"`).join(','));
            });
            const blob = new Blob(["\uFEFF" + csvRows.join('\n')], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = "export.csv"; a.click();
        });
    </script>
</body>
</html>
