<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Incidencias INCASUR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-slate-900 text-white shadow-md px-6 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div>
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i class="fa-solid fa-chart-bar text-xl"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Cuadro de Mando - Control INCASUR</h1>
            </div>
            <p class="text-slate-400 text-xs mt-1">Visor web en tiempo real de incidencias sin resolver</p>
        </div>
        <div class="bg-slate-800 px-4 py-2 rounded-lg border border-slate-700 text-xs text-slate-300 flex items-center gap-2">
            <i class="fa-solid fa-clock text-blue-400"></i>
            <span>Última carga: <span id="last-update" class="font-semibold text-white">-</span></span>
        </div>
    </header>

    <section class="bg-white rounded-xl shadow-xs border border-slate-200 overflow-hidden flex flex-col flex-1">
        <div class="px-5 py-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
            <h3 class="font-bold text-slate-900 text-sm">Vista de Control de Operaciones</h3>
            <button id="btn-export-csv" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-xs px-3 py-2 rounded-lg transition">Exportar CSV</button>
        </div>
        <div class="overflow-x-auto flex-1 custom-scrollbar">
            <table class="w-full text-left border-collapse text-xs">
                <thead>
                    <tr class="bg-slate-100 border-b border-slate-200 text-slate-500 font-bold uppercase">
                        <th class="py-3 px-4">Incidencia</th>
                        <th class="py-3 px-4">Creada</th>
                        <th class="py-3 px-4">Estado</th>
                        <th class="py-3 px-4">Departamento</th>
                        <th class="py-3 px-4">Asignee</th>
                        <th class="py-3 px-4">Reporter</th>
                        <th class="py-3 px-4">Días Totales</th>
                        <th class="py-3 px-4">Atascada Dpto</th>
                        <th class="py-3 px-4">Días s/Mod</th>
                        <th class="py-3 px-4">Rebotes</th>
                        <th class="py-3 px-4">Reclam.</th>
                        <th class="py-3 px-4">Resumen</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-slate-100 text-slate-700">
                    </tbody>
            </table>
        </div>
    </section>

    <script>

        const data = await response.json();
        
        // Actualizar fecha de última carga
        if (data.updated_at) {
            const date = new Date(data.updated_at);
            document.getElementById('last-update').textContent = date.toLocaleString();
        }

            return `
                <tr class="hover:bg-slate-50 border-b border-slate-100">
                    <td class="py-3 px-4 font-bold">${item["Incidencia"] || ""}</td>
                    <td class="py-3 px-4">${item["Fecha de Creación"] || ""}</td>
                    <td class="py-3 px-4">${item["Estado"] || ""}</td>
                    <td class="py-3 px-4">${item["Departamento Responsable"] || ""}</td>
                    <td class="py-3 px-4">${item["Asignee"] || ""}</td>
                    <td class="py-3 px-4">${item["Reporter"] || ""}</td>
                    <td class="py-3 px-4">${item["Días Abierta Totales"] || 0}</td>

                    <td class="py-3 px-4">${item["Días desde Última Modificación"] || 0}</td>
                    <td class="py-3 px-4">${item["Rebotes a Front-Office"] || 0}</td>
                    <td class="py-3 px-4">${item["Nº Reclamaciones"] || 0}</td>
                    <td class="py-3 px-4 truncate max-w-xs">${item["Resumen"] || ""}</td>
                </tr>
            `;
        }).join('');
    </script>
</body>
</html>
